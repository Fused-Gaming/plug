name: Ingest Community Submissions

# Phase B of the v2.1.0 data pipeline (issue #21): hourly ingest of
# `submission`-labeled issues created via the "Suggest a charging location"
# issue form. Valid entries become community-tier venues; invalid ones get a
# `needs-info` label and a comment explaining what to fix.
#
# Same commit rules as data-sync.yml: `data:` prefix, commit-on-diff, no
# [skip ci] so Pages republishes. Off-minute hourly cron per fleet etiquette.

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: data-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (native build needed for better-sqlite3)
        run: npm ci

      - name: Ensure triage labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for label in 'submission:1d4ed8:Community location suggestion' \
                       'ingested:047857:Picked up by the automated ingest' \
                       'needs-info:b45309:Submission needs fixes before ingest'; do
            name="${label%%:*}"; rest="${label#*:}"; color="${rest%%:*}"; desc="${rest#*:}"
            curl -sf -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/labels" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"name\":\"${name}\",\"color\":\"${color}\",\"description\":\"${desc}\"}" \
              > /dev/null || true # 422 = already exists
          done

      - name: Run ingest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/etl/ingest-submissions.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data public/data && [ -z "$(git status --porcelain data public/data)" ]; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public/data
          git commit -m "data: ingest community submissions $(date -u +%F)"
          git push

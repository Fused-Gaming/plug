name: Data Sync (OSINT ETL)

# Phase A of the v2.1.0 data pipeline (issue #20): daily pull of public venue
# data for the Oakland service area via the OpenStreetMap Overpass API into
# data/locations.db (canonical SQLite) and public/data/locations.json (site
# runtime). Commits directly to main with the `data:` prefix per the
# data-sync bot exception in docs/05-development/BRANCHING_STRATEGY.md.
#
# Deliberately NO [skip ci] on the data commit: the deploy workflow must run
# so GitHub Pages republishes the fresh JSON. No loop is possible — deploy
# never commits, and the prompt-archive workflow's own commit carries
# [skip ci]. Off-peak, off-minute cron per Overpass etiquette (one bounded
# query per day). Scheduled-workflow keepalive: the daily commit itself keeps
# the repository active, which prevents GitHub's 60-day schedule auto-disable.

on:
  schedule:
    - cron: '41 10 * * *' # Daily at 03:41 Pacific
    - cron: '51 10 * * 0' # Sundays at 03:51 Pacific (staleness check after sync)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (native build needed for better-sqlite3)
        run: npm ci

      - name: Run ETL
        run: node scripts/etl/sync-locations.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data public/data && [ -z "$(git status --porcelain data public/data)" ]; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public/data
          git commit -m "data: refresh Oakland locations $(date -u +%F)"
          git push

  staleness-check:
    needs: sync
    runs-on: ubuntu-latest
    if: github.event.schedule == '51 10 * * 0'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run staleness check
        env:
          OPENSTREETMAP_API: ${{ secrets.OPENSTREETMAP_API || 'https://overpass-api.de/api/interpreter' }}
        run: node scripts/etl/staleness-check.mjs --db=data/locations.db

      - name: Commit staleness updates
        run: |
          if git diff --quiet -- data public/data; then
            echo "No staleness changes; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public/data
          git commit -m "data: update venue staleness tracking (weekly verification)"
          git push
